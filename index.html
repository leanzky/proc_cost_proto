<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-300 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Main Terminal Container -->
    <div class="w-full max-w-5xl h-[85vh] flex flex-col bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl terminal-glow overflow-hidden">
        
        <!-- Terminal Header -->
        <div class="px-6 py-4 bg-slate-800/50 border-b border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                </div>
                <div class="h-4 w-px bg-slate-700 mx-2"></div>
                <div class="flex items-center gap-2 text-slate-400 font-mono text-xs uppercase tracking-widest">
                    <i class="fa-solid fa-microchip text-blue-400"></i>
                    Agent Control Center
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-mono text-slate-500 bg-slate-900 px-2 py-1 rounded border border-slate-700">v1.0.4-stable</span>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-xs font-mono text-green-500/80">ONLINE</span>
                </div>
            </div>
        </div>

        <!-- Terminal Output Area -->
        <div id="terminal-output" class="flex-1 overflow-y-auto p-6 font-mono text-sm space-y-3 bg-gradient-to-b from-slate-900 to-black">
            <div class="text-slate-500">[SYSTEM]: Connection established.</div>
            <div class="text-slate-500">[SYSTEM]: Kernel loaded. Awaiting instructions...</div>
            <div class="text-blue-400/80">Welcome, Leands. The agent is ready for deployment.</div>
        </div>

        <!-- Command Input Area -->
        <div class="p-6 bg-slate-800/30 border-t border-slate-800">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 font-mono">
                    <span class="text-blue-500 font-bold">λ</span>
                </div>
                <input type="text" id="agent-input" placeholder="Send a command to your agent..." 
                       class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-10 pr-32 py-4 text-sm font-mono text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all shadow-inner">
                <button onclick="sendCommand()" 
                        class="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-500 text-white px-6 rounded-lg text-xs font-bold uppercase tracking-wider transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                    Execute
                </button>
            </div>
        </div>
    </div>

    <script>
        async function sendCommand() {
            const input = document.getElementById('agent-input');
            const output = document.getElementById('terminal-output');
            const cmd = input.value.trim();
            
            if (!cmd) return;

            appendLine(`> ${cmd}`, 'text-blue-400 font-bold');
            input.value = '';

            try {
                const response = await fetch('https://human-cavalier-nest.ngrok-free.dev/api/agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await response.json();
                appendLine(`[AGENT]: ${data.response}`, 'text-green-400');
            } catch (e) {
                appendLine(`[ERROR]: Communication failure. Bridge to AI Agent not configured.`, 'text-red-400');
            }
        }

        function appendLine(text, colorClass) {
            const output = document.getElementById('terminal-output');
            const line = document.createElement('div');
            line.className = colorClass;
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        document.getElementById('agent-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCommand();
        });
    </script>

</body>
</html>
